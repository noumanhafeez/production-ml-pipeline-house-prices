<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <!-- Responsive Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 22px;
        }

        .price {
            font-size: 26px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            word-wrap: break-word;
        }

        a {
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 10px;
            transition: 0.3s;
            font-size: 14px;
        }

        a:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* 📱 Mobile */
        @media (max-width: 480px) {
            .card {
                padding: 20px;
                border-radius: 15px;
            }

            h2 {
                font-size: 18px;
            }

            .price {
                font-size: 22px;
            }

            a {
                font-size: 13px;
                padding: 9px 16px;
            }
        }

        /* 💻 Larger screens */
        @media (min-width: 768px) {
            .card {
                max-width: 500px;
                padding: 40px;
            }

            h2 {
                font-size: 24px;
            }

            .price {
                font-size: 30px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🏠 Prediction Result</h2>

    <div class="price">
        💰 {{ prediction }}
    </div>

    <a href="/">🔙 Predict Again</a>
</div>

</body>
</html>
